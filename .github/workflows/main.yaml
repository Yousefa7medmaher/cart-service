name: Main Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  call-nodejs-ci:
    uses: ./.github/workflows/reusable-workflow.yaml
    with:
      node-version: '18'

  test:
    runs-on: ubuntu-latest
    needs: call-nodejs-ci
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://localhost:27017/cartdb
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - name: Wait for MongoDB
        run: |
          echo "Waiting for MongoDB..."
          for i in {1..20}; do
            nc -z localhost 27017 && echo "MongoDB is up" && break
            sleep 2
          done
      - name: Start server
        run: nohup node src/server.js > server.log 2>&1 &
      - name: Run tests
        run: node ./test-cart.js
      
  cd:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - call-nodejs-ci
      - test
    if: github.ref_name == 'master' 
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
           aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
           
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: "Build and push the image" 
        uses:  docker/build-push-action@v5 
        with:
          context: . 
          push: true
          tags: |
             484907510239.dkr.ecr.us-east-1.amazonaws.com/cart-service:v1.${{github.run_number}}
             484907510239.dkr.ecr.us-east-1.amazonaws.com/cart-service:latest
             484907510239.dkr.ecr.us-east-1.amazonaws.com/cart-service:v1.${{github.sha}}
